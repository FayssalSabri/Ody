services:
  postgres:
    image: postgres:16
    container_name: odyssey-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odyssey
    ports:
      - '5432:5432'
    volumes:
      - odyssey-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d odyssey']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  odyssey-postgres-data:
